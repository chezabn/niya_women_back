services:
  database:
    image: mysql:9.3.0
    container_name: mysql_auth
    restart: always
    env_file:
      - .env
    volumes:
      - mysql-auth:/var/lib/mysql
    ports:
      - "5000:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql-auth: