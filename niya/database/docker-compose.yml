services:
  database:
    image: mysql:9.3.0
    container_name: mysql
    restart: always
    env_file:
      - ".env.dev"
    volumes:
      - mysql:/var/lib/mysql
    ports:
      - "5000:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    container_name: backend
    image: backend_api
    ports:
      - "5001:5001"
    env_file:
      - ".env.dev"
    depends_on:
      database:
        condition: service_healthy

volumes:
  mysql: